services:
  - type: web
    name: loopinpet-mvp
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: WHATSAPP_API_URL
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
